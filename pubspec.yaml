name: smart_budget_app
description: "A minimal and stylish budget tracking app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Управление состоянием
  provider: ^6.1.1
  
  # Работа с API курсов валют
  http: ^1.2.0
  
  # Форматирование дат и валют
  intl: ^0.19.0

  # Иконки (стандарт для Flutter)
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # Если в будущем захочешь добавить свои иконки или картинки, 
  # раскомментируй секцию ниже:
  # assets:
  #   - assets/images/